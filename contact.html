    <!-- Main Content -->
    <main class="main-content">

<div class="glass-card mx-auto" style="max-width: 650px; margin: 3rem auto; padding: 4rem 3rem;">
    <div class="text-center mb-5">
        <h1 class="gradient-text lg-text" style="font-size: 3rem;">Secure Transmission</h1>
        <p class="text-muted mt-2" style="font-size:1.1rem;">Got a question, bug report, or suggestion? Reach out to the architecture team instantly.</p>
    </div>
    <form onsubmit="event.preventDefault(); alert('Transmission Successful! We will review shortly.');" style="background: rgba(0,0,0,0.3); padding: 2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
        <div class="mb-4">
            <label class="d-block mb-2 text-gold font-weight-500">Authorized Name</label>
            <input type="text" class="modern-input mb-0" required placeholder="John Doe">
        </div>
        <div class="mb-4">
            <label class="d-block mb-2 text-gold font-weight-500">Email Address (For Routing)</label>
            <input type="email" class="modern-input mb-0" required placeholder="name@domain.com">
        </div>
        <div class="mb-5">
            <label class="d-block mb-2 text-gold font-weight-500">Encrypted Payload</label>
            <textarea class="modern-input mb-0" required style="min-height: 180px; resize:vertical; padding: 15px;" placeholder="Detail your feedback or request..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100" style="padding: 18px; font-size:1.15rem; font-weight:700;"><i class="fa-solid fa-paper-plane me-2"></i> Send Protocol</button>
    </form>
</div>
